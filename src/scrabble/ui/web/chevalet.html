    <!-- Fenêtre chevalet VIDÉE (issue #187, Issue B). Tout le contenu utile — le
         panneau des 9 cases et sa logique — a été migré dans la zone C de
         jeu.html / jeu.js ; chevalet.js et chevalet.css ont été supprimés. Ce
         fichier n'est conservé, réduit à un document vide, QUE parce que le modèle
         de fenêtres Python (``_creer_fenetre_chevalet``, hors périmètre de cette
         issue) crée encore une fenêtre compagnon qui charge cette page : le
         supprimer ferait charger un fichier inexistant (page d'erreur visible). La
         suppression de ce fichier ET de la fenêtre compagnon est le périmètre de
         l'Issue C, une fois le modèle de fenêtres nettoyé.

         Le fond vert (même tapis que le plateau) évite tout flash blanc si la
         fenêtre compagnon vide venait à s'afficher brièvement avant l'Issue C. -->
    <style>
        html, body {
            height: 100%;
            margin: 0;
            /* Feutre vert cohérent avec le plateau (issue #113), pour qu'une
               éventuelle apparition transitoire de cette fenêtre vide reste
               discrète. */
            background: #35654d;
        }
    </style>
