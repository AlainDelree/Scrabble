<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble - Chevalet</title>
    <link rel="stylesheet" href="commun.css">
    <link rel="stylesheet" href="chevalet.css">
</head>
<body>
    <!-- Fenêtre chevalet flottante (issue #90) : frameless + on_top + non
         redimensionnable côté Python. Le déplacement se fait par glisser-déposer
         APPLICATIF sur cette barre du haut (issue #91 point 2) : chevalet.js écoute
         les événements pointeur et appelle api.deplacer_chevalet(). On n'utilise pas
         .pywebview-drag-region, non géré par le backend WebKitGTK sous Linux (le
         drag natif GTK n'existe que via easy_drag=True, qui déplacerait la fenêtre
         au moindre glissé — y compris pendant un clic-clic de pose). Le drag reste
         donc strictement confiné à cette barre. -->
    <div class="barre-drag" id="barre-drag">
        <span class="barre-drag-titre">🎴 Mon chevalet</span>
        <span class="barre-drag-poignee" aria-hidden="true">⠿ déplacer</span>
    </div>

    <!-- Panneau unifié (issue #100) : une seule structure de 9 cases, toujours
         visible et réarrangeable, y compris hors tour. Plus de boîte « attente »,
         plus de bascule « voir/cacher » : le chevalet du joueur de référence est
         toujours exposé (garantie de confidentialité assurée côté API, issue #99). -->
    <div class="chevalet-fenetre">
        <div class="bloc-panneau">
            <div class="panneau-entete">
                <span class="panneau-titre-groupe">
                    <span class="panneau-titre bloc-titre">
                        🎴 Mes lettres <span class="bloc-titre-note">— cliquez une lettre, réarrangez librement</span>
                    </span>
                </span>
            </div>
            <div id="panneau" class="panneau" aria-label="Chevalet du joueur (réarrangeable)"></div>
        </div>
    </div>

    <!-- Modale de choix de la lettre représentée par un joker (issue #90 : la
         lettre vient du chevalet, la modale s'ouvre donc côté chevalet). -->
    <div id="joker-modale" class="modale" hidden>
        <div class="modale-contenu">
            <h3>Quelle lettre représente le joker ?</h3>
            <div id="joker-grille" class="joker-grille"></div>
            <button id="joker-annuler" class="btn btn-secondaire">Annuler</button>
        </div>
    </div>

    <!-- La modale de détail du score (« Vérifier et calculer ») vit désormais côté
         fenêtre plateau (issue #101 : les actions de tour y ont été déplacées). -->

    <script src="commun.js"></script>
    <script src="chevalet.js"></script>
</body>
</html>
