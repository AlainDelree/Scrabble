<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble - Plateau</title>
    <link rel="stylesheet" href="commun.css">
    <link rel="stylesheet" href="jeu.css">
</head>
<body>
    <!-- Décor issue #70 (suite #66) : « SCRABBLE » en grand, blanc, orienté
         verticalement (rotation 90°), plaqué sur le bord GAUCHE de l'écran, à
         hauteur de la zone du sac de lettres (sur le tapis vert, issue #59).
         Purement esthétique : aria-hidden (ignoré des lecteurs d'écran),
         pointer-events:none + user-select:none (voir .decor-scrabble) → il
         n'intercepte JAMAIS un clic et ne gêne aucune interaction. Placé dans
         la gouttière verte à gauche du contenu centré ; masqué en dessous d'une
         certaine largeur de fenêtre (media query) pour ne jamais chevaucher le
         sac, l'historique, les panneaux ou le plateau. -->
    <div class="decor-scrabble" aria-hidden="true">SCRABBLE</div>

    <!-- Vérification dictionnaire (issue #86) : sortie de la zone chevalet, où
         elle n'avait rien à voir avec le tour de jeu en cours. Elle est logée
         ici, dans l'espace vertical libre à gauche de l'écran (entre le décor
         « SCRABBLE » et la barre du sac), derrière un bouton discret. Un clic
         ouvre un petit popover contenant le champ + le bouton de vérification :
         MÊME comportement qu'avant (même logique JS, mêmes id #champ-verif /
         #btn-verifier / #message-brouillon), seul l'emplacement change.
         Repli responsive (voir jeu.css) : quand la gouttière gauche est trop
         étroite (fenêtre non maximisée), le bouton se réduit à sa seule icône
         🔎 plutôt que de disparaître ou de casser la mise en page. -->
    <div class="verif-dico-ancre">
        <button id="btn-ouvrir-verif" class="btn btn-verif-dico"
                aria-haspopup="dialog" aria-expanded="false"
                title="Vérifier si un mot existe dans le dictionnaire">
            <span class="verif-dico-icone" aria-hidden="true">🔎</span>
            <span class="verif-dico-libelle">Vérification dictionnaire</span>
        </button>
        <div id="verif-dico-popover" class="verif-dico-popover" role="dialog"
             aria-label="Vérification d'un mot dans le dictionnaire" hidden>
            <!-- Champ + bouton IDENTIQUES à l'existant, simplement déplacés
                 depuis la zone chevalet (issue #86, ex-issue #50). Le joueur tape
                 LIBREMENT le mot à tester (n'importe quelles lettres, même
                 absentes du chevalet) : outil de réflexion sans effet sur la
                 partie. -->
            <div class="zone-verif-dico">
                <input type="text" id="champ-verif" class="champ-verif"
                       placeholder="Tapez un mot à tester…"
                       aria-label="Mot à vérifier dans le dictionnaire"
                       autocomplete="off" spellcheck="false">
                <button id="btn-verifier" class="btn btn-secondaire btn-petit">
                    🔎 Vérifier le mot dans le dictionnaire
                </button>
            </div>
            <p id="message-brouillon" class="message-brouillon" role="status" aria-live="polite"></p>
            <!-- Définition affichée sous le verdict quand le mot est valide
                 (issue #124). Vide/masqué si mot invalide ou brouillon vide. -->
            <div id="definition-brouillon" class="definition-brouillon" aria-live="polite" hidden></div>
        </div>
    </div>

    <div class="container">
        <!-- Barre globale unique (issue #47, point 2) : le sac, l'accès à
             l'historique « Derniers coups » et le lien « Resynchroniser » sont
             fusionnés sur UNE seule ligne horizontale en haut de l'écran.
             L'ancienne colonne d'historique verticale (issue #45, point 4) qui
             prenait toute la hauteur de la table à gauche a disparu : la hauteur
             est rendue au plateau et au chevalet/brouillon. L'historique est ici
             un menu déroulant (<details>) qui, replié, ne consomme presque aucune
             hauteur ; déplié, sa liste s'affiche en surimpression sous la barre
             (position absolue) sans repousser la table vers le bas. -->
        <header>
            <!-- Disposition de la barre (issue #125) : « Derniers coups » à
                 GAUCHE (juste après la loupe de vérification, en gouttière), et
                 le sac REGROUPÉ à droite avec « Resynchroniser » / « Retour au
                 menu ». Ordre visuel, de gauche à droite : loupe | Derniers
                 coups … Sac, Resynchroniser, Retour au menu. Bénéfice : à gauche,
                 le menu déroulant « Derniers coups » s'ouvre dans l'espace libre
                 de la gouttière sans recouvrir le plateau (voir jeu.css, le
                 groupe de droite est poussé par ``margin-left:auto`` sur .sac). -->
            <div class="barre-globale">
                <!-- Accès à l'historique glissant (issue #37) fusionné dans la
                     barre (issue #47, point 2). Déplacé À GAUCHE (issue #125).
                     <details> natif : replié par défaut (aucune hauteur), la
                     liste s'ouvre au clic en surimpression. La plus RÉCENTE EN
                     HAUT ; chaque ligne cliquable rouvre le détail du score de CE
                     coup (modale). -->
                <!-- Bouton + popover (issue #144) : on abandonne le <details>
                     natif au profit du MÊME mécanisme que « Vérification
                     dictionnaire » (C.configurerPopover, voir commun.js) :
                     ouverture/fermeture au clic sur le bouton, fermeture au clic
                     EXTÉRIEUR ou à la touche Échap. Ce mécanisme unique remplace
                     l'ancienne logique séparée qui devait ruser avec la bascule
                     native du <details> sous WebKitGTK (issues #49/#56/#60) et ne
                     se fermait pas à la perte de focus. La mise en page en ligne
                     (titre + compteur + chevron) reste portée par un wrapper
                     interne. -->
                <div class="historique-menu" id="historique-menu">
                    <button id="btn-historique" class="historique-resume"
                            aria-haspopup="dialog" aria-expanded="false">
                        <span class="historique-resume-inner">
                            <span class="historique-resume-titre">🕑 Derniers coups</span>
                            <span class="historique-resume-compte" id="historique-compte"></span>
                        </span>
                    </button>
                    <ol id="historique-liste" class="historique-liste" role="dialog"
                        aria-label="Historique des coups de la partie"
                        aria-live="polite" hidden></ol>
                </div>

                <!-- Sac de lettres restantes (🎒 + nombre). Déplacé À DROITE
                     (issue #125), en tête du groupe droit : ``margin-left:auto``
                     sur .sac (voir jeu.css) le pousse, lui et les deux boutons
                     utilitaires qui suivent, tout à droite de la barre. -->
                <div class="sac">
                    <span class="sac-icone">🎒</span>
                    <span class="sac-nombre" id="sac-nombre">—</span>
                    <span class="sac-label">lettres</span>
                </div>

                <!-- Bouton « Resynchroniser » (issue #41, point 3 ; issue #78).
                     CONSERVÉ. L'affichage se met déjà à jour tout seul après
                     chaque action (pose, passe, échange, tour d'ordinateur) ; son
                     seul rôle légitime est de forcer un rechargement depuis le
                     moteur en cas de doute sur la synchronisation de la vue.
                     Autrefois un lien discret : jugé trop peu visible pour un
                     public senior (issue #78). Rendu ici en vrai bouton
                     secondaire (fond neutre gris, padding confortable) —
                     clairement repérable et cliquable, mais visuellement en
                     retrait des boutons d'action de jeu (vert primaire) pour ne
                     pas suggérer une action aussi fréquente que poser un mot. -->
                <button id="btn-rafraichir" class="btn btn-secondaire btn-utilitaire"
                        title="Recharger l'affichage depuis le moteur (en cas de doute sur la synchronisation)">
                    ↻ Resynchroniser
                </button>

                <!-- Bouton « Retour au menu » (issue #74 ; issue #78). Même style
                     de bouton secondaire que « Resynchroniser », disponible à tout
                     moment. Ferme l'écran de jeu et rouvre l'accueil ; la partie
                     reste persistée et reprenable. Si des lettres sont posées mais
                     non validées, un avertissement (modale légère ci-dessous)
                     évite de perdre une réflexion en cours par erreur de clic ;
                     sans lettre en attente, le retour est immédiat. -->
                <button id="btn-retour-menu" class="btn btn-secondaire btn-utilitaire"
                        title="Fermer la partie et revenir au menu d'accueil (la partie reste reprenable)">
                    🏠 Retour au menu
                </button>
            </div>
        </header>

        <!-- Message éphémère de pose (issue #90) : la pose clic-clic se pilote
             depuis la fenêtre chevalet (sélection) + la fenêtre plateau (case
             cliquée). Comme la zone de message de tour vit désormais côté
             chevalet, ce court retour (« sélectionnez d'abord une lettre »,
             « case occupée », « choisissez la lettre du joker côté chevalet »)
             s'affiche ici, en surimpression discrète, sans repousser la table. -->
        <div id="message-plateau" class="message-plateau" role="status" aria-live="polite" hidden></div>

        <!-- Table de jeu : plateau central entouré des panneaux joueurs, chacun
             positionné sur le côté qui lui est assigné côté Python (issue #33).
             Le panneau du bas est celui du joueur humain de référence : il porte,
             en plus de ses infos publiques, le chevalet + le brouillon + les
             actions de tour. Les panneaux haut/gauche/droite sont publics.
             L'historique « Derniers coups » n'occupe plus de colonne à gauche
             (issue #47, point 2) : il est fusionné dans la barre globale en haut,
             ce qui rend la hauteur au plateau et au chevalet/brouillon. -->
        <main class="table">
            <div id="slot-haut" class="slot slot-haut" aria-label="Joueur du haut"></div>
            <div id="slot-gauche" class="slot slot-gauche" aria-label="Joueur de gauche"></div>

            <section class="zone-plateau">
                <div id="plateau" class="plateau" aria-label="Plateau de jeu 15 par 15"></div>
            </section>

            <div id="slot-droite" class="slot slot-droite" aria-label="Joueur de droite"></div>

            <!-- Panneau du bas : joueur humain de référence, encadré par ses
                 actions de tour (issue #160). Pour gagner de la hauteur (et donc
                 agrandir le plateau), les boutons d'action ne forment plus une
                 barre séparée EN DESSOUS de la fiche : ils sont répartis SUR LA
                 MÊME LIGNE, de part et d'autre de la fiche du joueur humain —
                 « Remettre / Passer » à gauche, « Annuler / Vérifier / Jouer » à
                 droite. Le cadre « En attente du coup de… » d'un tour d'ordinateur
                 (ancien #zone-attente-ia) est supprimé : le tour d'un ordinateur se
                 déclenche déjà via le bouton « ▶ Jouer » de sa propre fiche
                 (issue #149), ce bandeau n'apportait plus rien. -->
            <footer class="panneau-bas" id="panneau-bas">
            <!-- Actions de tour À GAUCHE de la fiche (issue #160) : échange complet
                 (ou flux d'échange partiel selon le réglage « type_echange ») +
                 « Passer son tour ». Affichées UNIQUEMENT pendant le tour du joueur
                 humain (masquées pendant l'attente d'un tour d'ordinateur et une
                 fois la partie terminée). La sélection d'une lettre se fait toujours
                 côté chevalet ; ces boutons pilotent le coup en attente via les
                 mêmes méthodes API qu'avant (echanger_tout / passer_tour…). Le garde
                 de tour côté API (issue #99) reste la protection de fond : masquer
                 ces boutons n'est qu'une aide visuelle. -->
            <div id="zone-actions-gauche" class="zone-actions zone-actions-gauche" hidden>
                <!-- Échange COMPLET (réglage « type_echange » = complet, défaut) :
                     un seul bouton qui remet tout le chevalet et passe. Bouton
                     à part entière (issue #139) — même style que les autres
                     actions de tour (secondaire), moins proéminent que « Jouer ». -->
                <button id="btn-echanger-tout" class="btn btn-secondaire" disabled
                        title="Remet tout votre chevalet dans le sac et passe votre tour (action rare)">
                    ♻️ Remettre toutes ses lettres et passer
                </button>
                <!-- Échange PARTIEL (réglage « type_echange » = partiel, issue #138) :
                     on entre dans un mode de sélection multiple côté chevalet, puis
                     on valide. Ces boutons ne sont visibles qu'en mode partiel.
                     Bouton à part entière (issue #147) — même famille visuelle que
                     « Remettre toutes ses lettres et passer » du mode complet
                     (« btn btn-secondaire »), pour une apparence de bouton cohérente
                     dès l'état initial, avant même d'engager la sélection. -->
                <button id="btn-commencer-echange" class="btn btn-secondaire" hidden
                        title="Choisissez librement les lettres à échanger sur votre chevalet, puis validez">
                    ♻️ Échanger des lettres…
                </button>
                <span id="zone-echange-partiel" class="zone-echange-partiel" hidden>
                    <button id="btn-echanger-selection" class="btn btn-primaire" disabled
                            title="Remet les lettres marquées dans le sac, en tire autant, et passe votre tour">
                        ♻️ Échanger la sélection et passer
                    </button>
                    <button id="btn-annuler-echange" class="btn btn-secondaire"
                            title="Quitte le mode d'échange sans rien échanger">
                        ✗ Annuler la sélection
                    </button>
                </span>
                <button id="btn-passer" class="btn btn-secondaire"
                        title="Passe votre tour sans poser ni échanger de lettres">
                    ⏭ Passer son tour
                </button>
            </div>

            <!-- Fiche du joueur humain de référence : centrée, encadrée par ses
                 actions de tour (issue #160). -->
            <div id="slot-bas" class="slot slot-bas" aria-label="Votre panneau"></div>

            <!-- Actions de tour À DROITE de la fiche (issue #160) : « Annuler »,
                 « Vérifier et calculer » et « Jouer ». Mêmes id / mêmes appels API
                 qu'avant le regroupement (annuler_pose / verifier_coup / poser_mot).
                 Le message de retour dédié (#message-coup) reste ancré à cette zone,
                 en surimpression au-dessus des boutons (voir jeu.css). -->
            <div id="zone-actions-droite" class="zone-actions zone-actions-droite" hidden>
                <button id="btn-annuler" class="btn btn-secondaire" disabled>
                    ✗ Annuler
                </button>
                <button id="btn-verifier-coup" class="btn btn-secondaire" disabled
                        title="Calcule les points du coup en attente sans le jouer (rien n'est perdu)">
                    🔎 Vérifier et calculer
                </button>
                <button id="btn-valider" class="btn btn-primaire" disabled>
                    ✓ Jouer
                </button>
                <p id="message-coup" class="message-coup" role="status" aria-live="polite"></p>
            </div>
            </footer>
        </main>
    </div>

    <!-- Modale de détail du score après un coup posé (issue #35). Présente
         chaque mot formé avec son score, les cases bonus utilisées, le bonus
         « scrabble » éventuel et le total. Fermeture par bouton ou clic dehors. -->
    <div id="score-modale" class="modale" hidden>
        <div class="modale-contenu modale-score">
            <h3 id="score-titre">Détail du score</h3>
            <div id="score-detail" class="score-detail"></div>
            <div id="score-total" class="score-total"></div>
            <button id="score-fermer" class="btn btn-primaire">Fermer</button>
        </div>
    </div>

    <!-- Modale d'avertissement avant un « Retour au menu » alors que des lettres
         sont posées mais non validées (issue #74). N'apparaît QUE dans ce cas :
         sans lettre en attente, le bouton revient au menu sans confirmation.
         Réutilise .modale / .modale-contenu. Fermeture par « Rester » ou clic
         dehors ; « Revenir au menu » confirme et ferme l'écran de jeu. -->
    <div id="retour-modale" class="modale" hidden>
        <div class="modale-contenu">
            <h3>Revenir au menu ?</h3>
            <p class="retour-message">
                Des lettres sont posées sur le plateau mais pas encore validées.
                Si vous revenez au menu maintenant, ce coup en attente sera
                abandonné. La partie, elle, reste enregistrée et reprenable.
            </p>
            <div class="modale-actions">
                <button id="retour-annuler" class="btn btn-secondaire">
                    Rester sur la partie
                </button>
                <button id="retour-confirmer" class="btn btn-primaire">
                    🏠 Revenir au menu
                </button>
            </div>
        </div>
    </div>

    <!-- Modale générique de confirmation avant une action de tour irréversible
         (issue #139) : « Passer son tour » et « Remettre toutes ses lettres et
         passer » ne déclenchent leur appel API qu'après confirmation, pour éviter
         un clic accidentel qui ferait perdre le tour sans recours. Le titre et le
         libellé du bouton de confirmation sont renseignés par le JS selon l'action.
         Réutilise .modale / .modale-contenu / .modale-actions ; fermeture par
         « Annuler » ou clic dehors (= annulation, aucun appel API). -->
    <div id="confirmation-modale" class="modale" hidden>
        <div class="modale-contenu" role="alertdialog" aria-modal="true"
             aria-labelledby="confirmation-titre">
            <h3 id="confirmation-titre">Confirmer l'action</h3>
            <p id="confirmation-message" class="retour-message"></p>
            <div class="modale-actions">
                <button id="confirmation-annuler" class="btn btn-secondaire">
                    ✗ Annuler
                </button>
                <button id="confirmation-confirmer" class="btn btn-primaire">
                    ✓ Confirmer
                </button>
            </div>
        </div>
    </div>

    <!-- Modale de fin de partie (issue #142) : remplace l'ancien bandeau de fin
         (issues #45/#133/#137). Une fois la partie terminée, elle s'ouvre par-dessus
         le plateau (resté visible en arrière-plan) avec le message de victoire, le
         tableau de classement final, l'évaluation du score combiné, et TROIS actions :
         « Retour au menu » (ferme le jeu, rouvre l'accueil), « Rester sur la partie »
         (ferme juste la modale pour consulter librement le plateau final) et
         « Recommencer » (nouvelle partie, mêmes joueurs, nouveau tirage). Réutilise
         .modale / .modale-contenu / .modale-actions. Le contenu (message, classement,
         évaluation) est injecté par le JS depuis l'état public poussé par Python. -->
    <div id="modale-fin" class="modale" hidden>
        <div class="modale-contenu modale-fin-contenu" role="dialog" aria-modal="true"
             aria-labelledby="modale-fin-message">
            <div id="modale-fin-message" class="bandeau-fin-message"></div>
            <div id="modale-fin-classement"></div>
            <div id="modale-fin-evaluation"></div>
            <div class="modale-actions modale-fin-actions">
                <button id="fin-retour-menu" class="btn btn-secondaire">
                    🏠 Retour au menu
                </button>
                <button id="fin-rester" class="btn btn-secondaire">
                    Rester sur la partie
                </button>
                <button id="fin-recommencer" class="btn btn-primaire">
                    🔄 Recommencer
                </button>
            </div>
        </div>
    </div>

    <!-- La modale de choix de lettre d'un joker vit désormais côté fenêtre
         chevalet (chevalet.html) : la lettre vient du chevalet, le choix s'y fait
         donc (issue #90). -->

    <!-- Calque de célébration festive quand un Scrabble (7 lettres, +50 pts) est
         posé (issue #64, suite de #58). Superposé plein écran mais totalement
         transparent aux clics (pointer-events: none via .scrabble-fete) : le JS
         y injecte brièvement des particules « feu d'artifice », ou un message
         sobre « 🎉 Scrabble ! » si prefers-reduced-motion est actif. -->
    <div id="scrabble-fete" class="scrabble-fete" aria-hidden="true"></div>

    <!-- Calque des toasts « +X points » (issue #136), affichés ~3 s près du
         panneau du joueur qui vient de marquer. Distinct de #scrabble-fete pour
         rester totalement indépendant du toast Scrabble (qui vide son propre
         calque) : les deux peuvent coexister sans se détruire l'un l'autre. Il
         est lui aussi plein écran et transparent aux clics. -->
    <div id="points-toasts" class="points-toasts" aria-hidden="true"></div>

    <script src="commun.js"></script>
    <script src="jeu.js"></script>
</body>
</html>
